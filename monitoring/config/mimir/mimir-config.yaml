multitenancy_enabled: false

server:
  http_listen_port: 9009
  log_level: info
  grpc_listen_port: 9010

common:
  storage:
    backend: filesystem
    filesystem:
      dir: /mimir/storage

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /mimir/blocks
  tsdb:
    dir: /mimir/tsdb
    retention_period: 720h  # 30 dias

compactor:
  data_dir: /mimir/compactor
  sharding_ring:
    kvstore:
      store: inmemory

distributor:
  ring:
    kvstore:
      store: inmemory

ingester:
  ring:
    kvstore:
      store: inmemory
    replication_factor: 1

limits:
  max_global_exemplars_per_user: 100000
  max_series_per_metric: 100000
  max_series_per_user: 1000000
  max_samples_per_second: 100000
  max_samples_per_query: 50000000
  max_query_lookback: 30d

ruler:
  rule_path: /etc/mimir/rules
  alertmanager_url: http://alertmanager:9093
  poll_interval: 1m
  evaluation_interval: 1m
  for_outage_tolerance: 5m
  for_grace_period: 5m
  enable_api: true
  rule_groups_poll_interval: 1m

querier:
  max_samples: 50000000
  query_ingesters_within: 3h

query_frontend:
  max_concurrent_requests: 20
  compression: snappy

# Habilitando API de regras para gerenciamento via UI/API
api:
  prometheus_http_prefix: /prometheus