server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
        grpc:

ingester:
  lifecycler:
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1

storage:
  trace:
    backend: local
    local:
      path: /opt/homelab/data/monitoring/tempo/traces

overrides:
  metrics_generator_processors: [service-graphs, span-metrics]
