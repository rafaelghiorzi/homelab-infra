auth_enabled: false

server:
  http_listen_port: 3100
  log_level: info

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Limites de retenção
limits_config:
  allow_structured_metadata: true
  retention_period: 720h  # 30 dias
  max_streams_per_user: 10000
  max_entries_limit_per_second: 10000
  split_queries_by_interval: 24h
  ingestion_rate_mb: 100  # Limite de ingestão
  ingestion_burst_size_mb: 200

# Log rules (opcional - comentado por agora)
ruler:
  enable_api: true
  rule_path: /loki/rules
  alertmanager_url: http://alertmanager:9093