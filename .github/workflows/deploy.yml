name: Homelab Sync
on:
  push:
    branches: [ main, dev ]

jobs:
  sync-files:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Sync Files
        run: |
          rsync -rtv --delete ./ /opt/homelab/homelab-infra/

  sync-cloudflare:
    runs-on: self-hosted
    needs: sync-files
    steps:
      - name: Register Cloudflare DNS Routes
        run: |
          echo "Lendo hostnames do config.yml..."
          CONFIG_PATH="/opt/homelab/homelab-infra/cloudflare/config.yml"

          grep "hostname:" $CONFIG_PATH | sed 's/.*hostname: //' | while read -r domain; do
            if [ -n "$domain" ]; then
              echo "Verificando rota para: $domain"
              cloudflared tunnel route dns homelab-tunnel "$domain" || echo "Aviso: Rota $domain não pôde ser criada (pode já existir)."
            fi
          done

      - name: Restart cloudflared service
        run: sudo systemctl restart cloudflared


  deploy:
    runs-on: self-hosted
    needs: sync-cloudflare
    steps:
      - name: Deploy Immich
        run: |
          echo "Deploying Immich"
          docker compose \
            -f /opt/homelab/homelab-infra/apps/immich/docker-compose.yml \
            --env-file /opt/homelab/secrets/.env \
            up -d

      - name: Deploy NextCloud
        run: |
          echo "Deploying NextCloud"
          docker compose \
            -f /opt/homelab/homelab-infra/apps/nextcloud/docker-compose.yml \
            --env-file /opt/homelab/secrets/.env \
            up -d

      - name: Deploy Flask App
        run: |
          echo "Deploying Flask App"
          docker compose \
            -f /opt/homelab/homelab-infra/apps/flask-app/docker-compose.yml \
            up -d

      - name: Deploy Monitoring
        run: |
          echo "Deploying monitoring"
          docker compose \
            -f /opt/homelab/homelab-infra/monitoring/docker-compose.yml \
            up -d