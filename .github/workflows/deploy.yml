name: Homelab Sync
on:
  push:
    branches: [ main ]

jobs:
  list-apps:
    runs-on: self-hosted
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          # 1. Busca pastas com compose, filtrando apenas as que existem para não dar erro
          # 2. Se não achar nada, retorna um array vazio [] para não quebrar o fromJson
          STACKS=$(find . -maxdepth 3 -name "docker-compose.yml" -printf '%h\n' | sed 's|./||' | jq -R -s -c 'split("\n")[:-1]')
          if [ -z "$STACKS" ] || [ "$STACKS" == "[]" ]; then
            echo "matrix=[]" >> $GITHUB_OUTPUT
          else
            echo "matrix=${STACKS}" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: list-apps
    # Só roda se a matriz não estiver vazia
    if: ${{ needs.list-apps.outputs.matrix != '[]' && needs.list-apps.outputs.matrix != '' }}
    runs-on: self-hosted
    strategy:
      matrix:
        stack: ${{ fromJson(needs.list-apps.outputs.matrix) }} # Corrigido para list-apps
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Sync Files to /opt/homelab/repo
        run: rsync -rtv --delete ./ /opt/homelab/repo/

      - name: Restart Cloudflare Tunnel
        run: |
          # Reinicia o serviço para aplicar mudanças no config.yml
          sudo systemctl restart cloudflared
          
          # Garante que os novos domínios tenham entrada no DNS da Cloudflare
          # (Isso só precisa rodar se você adicionou um hostname novo no YAML)
          HOSTNAMES=$(grep "hostname:" /opt/homelab/repo/networking/cloudflare/config.yml | awk '{print $2}')
          for HOST in $HOSTNAMES; do
            cloudflared tunnel route dns homelab-tunnel $HOST || true
          done

      - name: Deploy ${{ matrix.stack }}
        run: |
          # O matrix.stack já contém 'apps/teste' ou 'monitoring/grafana'
          COMPOSE_FILE="/opt/homelab/repo/${{ matrix.stack }}/docker-compose.yml"
          
          echo "🚀 Iniciando deploy em: $COMPOSE_FILE"
          if [ -f "$COMPOSE_FILE" ]; then
            docker compose -f "$COMPOSE_FILE" up -d
          else
            echo "❌ Erro: Arquivo não encontrado!" && exit 1
          fi