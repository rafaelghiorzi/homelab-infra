name: Homelab Sync
on:
  push:
    branches: [ main ]

jobs:
  setup-and-sync:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Sync Files to /opt/homelab/repo
        run: |
          mkdir -p /opt/homelab/repo
          rsync -rtv --delete ./ /opt/homelab/repo/

  deploy:
    runs-on: self-hosted
    needs: setup-and-sync
    steps:
      - name: Deploy Immich
        run: |
          echo "Deploying Immich"
          docker compose \
            -f /opt/homelab/repo/apps/immich/docker-compose.yml \
            --env-file /opt/homelab/secrets/.env \
            up -d
